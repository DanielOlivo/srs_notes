name: Deploy to GitHub Pages

on:
  push:
    branches: [ domain ]
    paths:
      - 'client/**'
      - 'domain/**'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build domain package
        run: pnpm -F domain build

      - name: Debug workspace state
        run: |
          echo "workspace packages:"
          pnpm -s -w -r --filter . ls --depth 0 || true
          echo "node_modules listing for domain:"
          ls -la node_modules/domain || true
          echo "packages/domain dist:"
          ls -la domain/dist || true
          echo "packages/client package.json:"
          cat client/package.json


      - name: Build client app
        run: pnpm -F srs_notes_client build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
